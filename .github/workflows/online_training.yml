name: Online Learning Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject GCP Credentials
        # Use a more resilient injection approach
        run: |
          cat << 'EOF' > gcp-key.json
          ${{ secrets.GCP_SA_KEY }}
          EOF

      - name: Create models directory
        run: mkdir -p models

      - name: Download Model and Progress
        run: python src/download_from_drive.py || echo "No model found"

      - name: Train Model
        run: python src/online_train.py

      - name: Upload Model and Progress
        run: python src/upload_to_drive.py

      - name: Log Run
        run: echo "Run completed at $(date)" >> training.log
